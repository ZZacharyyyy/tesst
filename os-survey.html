<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose your OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
* {
	border: 0;
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}
:root {
	--foldDur: 0.7s;
	font-size: calc(20px + (26 - 20)*(100vw - 320px)/(1280 - 320));
}
body, button, input {
	color: #171717;
	font: 1em Gaegu, cursive;
	line-height: 1.5;
}
body {
	min-height: 100vh;
	position: relative;
}
.bg-video {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	object-fit: cover;
	z-index: -2;
}
.bg-overlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0,0,0,0.35);
	z-index: -1;
}
form {
	background: rgba(255,253,247,0.9);
	box-shadow: 0 0.2em 1em #0004;
}
form, .select__button, .select__options {
	width: 100%;
}
form {
	margin: auto;
	padding: 3em 1.5em 3em 1.5em;
	max-width: 20em;
}
h1 {
	text-align: center;
	margin-bottom: 1em;
	font-size: 1.4em;
}
label {
	display: block;
	font-weight: bold;
}
.select, .select__button {
	position: relative;
}
.select {
	margin-bottom: 1.5em;
	perspective: 20em;
}
.select select {
	display: none;
}
.select__button, .select__option {
	background: #f1f1f1;
	cursor: pointer;
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 0 0.375em;
}
.select__button {
	animation-duration: var(--foldDur);
	animation-timing-function: ease-in-out;
	animation-direction: reverse;
	border-radius: 0;
	box-shadow:
		-0.05em 0 0 #fff inset,
		0.05em 0 0 #ccc inset,
		0 -0.05em 0 #d9d9d9 inset;
	transform-origin: 50% 100%;
	-webkit-appearance: none;
	appearance: none;
	z-index: 1;
}
.select__button:focus, .select__option:focus {
	outline: transparent;
}
.select__button:focus {
	color: #2762f3;
}
.select__button:after, .select__option:first-child:after {
	border-left: 0.25em solid transparent;
	border-right: 0.25em solid transparent;
	content: "";
	display: block;
	width: 0;
	height: 0;
}
.select__button:after {
	border-top: 0.25em solid;
}
.select__button--pristine {
	animation: none;
}
.select__options {
	position: absolute;
	top: 0;
	left: 0;
	visibility: hidden;
	transition: visibility 0s var(--foldDur) steps(1);
	max-height: 60vh;
	overflow-y: auto;
}
.select__option {
	box-shadow:
		-0.05em -0.1em 0.2em 0 #0001 inset,
		0.05em 0 0 #ccc inset,
		-0.05em 0.1em 0.2em 0 #fff inset,
		-0.05em 0 0 #fff inset;
	color: inherit;
	opacity: 0;
	text-decoration: none;
	transition: opacity 0s var(--foldDur) steps(1);
}
.select__option:first-child {
	box-shadow:
		-0.05em -0.1em 0.2em 0 #0001 inset,
		0.05em 0 0 #ccc inset,
		-0.05em 0 0 #fff inset;
}
.select__option:first-child:after {
	border-bottom: 0.25em solid;
}
.select__option:hover, .select__option:focus {
	background: #b8ccf9;
	box-shadow:
		-0.05em -0.1em 0.2em 0 #0001 inset,
		0.05em 0 0 #a9bbe5 inset,
		-0.05em 0 0 #c1d4ff inset;
}
.select__option[aria-selected="true"]:not(:first-child):after {
	content: "\2713";
}

/* Animation classes for arbitrary option counts (up to 12) */
.select__button[aria-expanded="true"] {
	animation-direction: normal;
	animation-fill-mode: forwards;
	box-shadow:
		-0.05em -0.1em 0.2em 0 #fff inset,
		-0.05em 0 0 #fff inset;
	cursor: default;
	pointer-events: none;
}
.select__button[aria-expanded="true"] + .select__options,
.select__button[aria-expanded="true"] + .select__options .select__option {
	transition-delay: 0s;
}
.select__button[class*="select__button--fold"][aria-expanded="true"] + .select__options {
	visibility: visible;
}
.select__button[class*="select__button--fold"][aria-expanded="true"] + .select__options .select__option {
	opacity: 1;
}

@keyframes appear {
	from { opacity: 0 }
	to { opacity: 1 }
}

/* Submit button */
.submit-btn {
	display: block;
	width: 100%;
	background: #171717;
	color: #f1f1f1;
	padding: 0.5em;
	cursor: pointer;
	font-weight: bold;
	font-size: 1em;
	box-shadow: 0.1em 0.1em 0 #0003;
	transition: transform 0.1s ease;
}
.submit-btn:hover { background: #2b2b2b; }
.submit-btn:active { transform: translateY(2px); box-shadow: none; }
.submit-btn:disabled { background: #999; cursor: default; }

.status {
	margin-top: 1em;
	text-align: center;
	min-height: 1.5em;
}
.status.error { color: #b3261e; }
.status.ok { color: #1b6e3c; }

/* Falling snow/leaves overlay */
.snow {
	position: fixed;
	top: 0; left: 0;
	width: 100%; height: 100%;
	pointer-events: none;
	overflow: hidden;
	z-index: 0;
}
.snowflake {
	position: absolute;
	top: -5%;
	color: #bfe4f5;
	opacity: 0.7;
	animation-name: fall;
	animation-timing-function: linear;
	animation-iteration-count: infinite;
}
@keyframes fall {
	from { transform: translate(0, 0) rotate(0deg); }
	to { transform: translate(var(--drift, 40px), 110vh) rotate(360deg); }
}

/* View counter badge */
.view-badge {
	position: fixed;
	top: 1em;
	left: 1em;
	display: flex;
	align-items: center;
	gap: 0.4em;
	color: #eee;
	background: rgba(0,0,0,0.35);
	padding: 0.3em 0.7em;
	font-size: 0.85em;
	z-index: 5;
}

/* Reveal card (shown after submitting) */
.reveal {
	margin-top: 1.5em;
	text-align: center;
}
.reveal-thanks {
	margin-bottom: 1em;
	font-size: 0.95em;
	opacity: 0.85;
}
.reveal-links {
	display: flex;
	justify-content: center;
	gap: 0.9em;
	flex-wrap: wrap;
}
.reveal-icon {
	color: #b026ff;
	filter: drop-shadow(0 0 4px #b026ff) drop-shadow(0 0 9px #b026ff88);
	transition: transform 0.15s ease, filter 0.15s ease;
}
.reveal-icon:hover {
	transform: translateY(-3px) scale(1.08);
	filter: drop-shadow(0 0 6px #d060ff) drop-shadow(0 0 14px #d060ffaa);
}

/* Fixed bottom music player */
.player {
	position: fixed;
	bottom: 0;
	left: 0;
	width: 100%;
	display: flex;
	align-items: center;
	gap: 0.9em;
	background: rgba(10,10,14,0.75);
	backdrop-filter: blur(6px);
	color: #eee;
	padding: 0.6em 1em;
	z-index: 5;
	font-size: 0.8em;
}
.player-art {
	width: 2.6em;
	height: 2.6em;
	flex-shrink: 0;
	background: linear-gradient(135deg,#3a3a3a,#111);
}
.player-body {
	flex: 1;
	min-width: 0;
}
.player-title {
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	margin-bottom: 0.3em;
}
.player-progress-track {
	background: #ffffff33;
	height: 0.25em;
	cursor: pointer;
}
.player-progress-fill {
	background: #eee;
	height: 100%;
	width: 0%;
}
.player-times {
	display: flex;
	justify-content: space-between;
	font-size: 0.85em;
	opacity: 0.7;
	margin-top: 0.2em;
}
.player-controls {
	display: flex;
	gap: 0.6em;
	flex-shrink: 0;
}
.player-btn {
	background: none;
	color: #eee;
	cursor: pointer;
	font-size: 1.1em;
	padding: 0.2em 0.4em;
}
.player-btn:hover { color: #b026ff; }

#osForm { padding-bottom: 5em; }

</style>
</head>

<script>
class SelectDropdown {
	constructor(args) {
		this.isOpening = false;
		this.select = document.querySelector(`select[id=${args.id}]`);
		this.selectBtn = document.createElement("button");
		this.options = document.createElement("div");
		this.buildDropdown();
	}
	buildDropdown() {
		if (this.select !== null) {
			let wrapper = document.createElement("div");
			wrapper.setAttribute("class","select");
			this.select.parentElement.insertBefore(wrapper,this.select);
			wrapper.appendChild(this.select);

			let id = this.select.id,
				selectBtnAttrs = {
					"class": "select__button select__button--pristine",
					"type": "button",
					"id": `${id}-options`,
					"aria-haspopup": "listbox",
					"aria-expanded": "false"
				};
			for (let a in selectBtnAttrs)
				this.selectBtn.setAttribute(a,selectBtnAttrs[a]);

			let selectBtnText = document.createTextNode(this.select.options[0].innerHTML);
			this.selectBtn.appendChild(selectBtnText);
			wrapper.appendChild(this.selectBtn);

			let optionsAttrs = {
				"class": "select__options",
				"aria-labelledby": selectBtnAttrs.id
			};
			for (let a in optionsAttrs)
				this.options.setAttribute(a,optionsAttrs[a]);

			for (let o of this.select.options) {
				let option = document.createElement("a"),
					optionText = document.createTextNode(o.innerHTML),
					optionAttrs = {
						"href": "#",
						"class": "select__option",
						"data-value": o.value,
						"role": "option",
						"aria-selected": "false"
					};
				for (let a in optionAttrs)
					option.setAttribute(a,optionAttrs[a]);
				option.appendChild(optionText);
				this.options.appendChild(option);
			}
			wrapper.appendChild(this.options);

			let preselected = this.options.querySelector(`[data-value=${this.select.value}]`);
			preselected.setAttribute("aria-selected",true);
			this.selectBtn.innerHTML = preselected.innerHTML;

			let selects = document.querySelectorAll(".select"),
				selectCount = 0;
			while (selectCount < selects.length) {
				selects[selectCount].style.zIndex = selects.length - selectCount;
				++selectCount;
			}

			document.querySelector(`label[for=${id}]`).addEventListener("click",() => {
				if (!this.isExpanded())
					this.selectBtn.focus();
				else
					this.closeSelect();
			});
			this.selectBtn.addEventListener("click",() => { this.openSelect(); });
			this.options.addEventListener("click",e => { this.closeSelect(e); });

			document.addEventListener("click",() => {
				let el = document.activeElement;
				if (!el.parentElement || el.parentElement.getAttribute("aria-labelledby") !== selectBtnAttrs.id)
					this.closeSelect();
			});
			window.addEventListener("keydown",e => {
				switch (e.keyCode) {
					case 27: this.closeSelect(); break;
					case 32: this.closeSelect(e); break;
					case 38: this.goToOption("previous"); break;
					case 40: this.goToOption("next"); break;
					default: break;
				}
			});
		}
	}
	isExpanded() {
		return this.selectBtn.getAttribute("aria-expanded") === "true";
	}
	openSelect(e) {
		if (!this.isExpanded()) {
			this.isOpening = true;
			setTimeout(() => {this.isOpening = false;},700);

			this.selectBtn.setAttribute("aria-expanded",true);

			let btnClasses = this.selectBtn.classList,
				pristineClass = "select__button--pristine",
				animClass = `select__button--fold${this.select.options.length}`;

			if (btnClasses.contains(pristineClass)) {
				btnClasses.remove(pristineClass);
			} else {
				btnClasses.remove(animClass);
				void this.selectBtn.offsetWidth;
			}
			btnClasses.add(animClass);
			this.options.style.visibility = "visible";
			for (let n of this.options.childNodes) n.style.opacity = "1";

			let selected = this.options.querySelector("[aria-selected=true]");
			if (selected !== null)
				selected.focus();
			else
				this.options.childNodes[0].focus();
		}
	}
	closeSelect(e) {
		if (this.isExpanded() && !this.isOpening) {
			if (e && e.target !== this.options.childNodes[0] && e.target.matches && e.target.matches(".select__option")) {
				this.select.value = e.target.getAttribute("data-value");
				this.selectBtn.innerHTML = e.target.innerHTML;

				for (let n of this.options.childNodes)
					n.setAttribute("aria-selected",false);

				e.target.setAttribute("aria-selected",true);
				e.preventDefault();
				this.select.dispatchEvent(new Event("change"));
			}
			this.selectBtn.setAttribute("aria-expanded",false);
			this.options.style.visibility = "hidden";
			for (let n of this.options.childNodes) n.style.opacity = "0";
			this.selectBtn.focus();

			let btnClasses = this.selectBtn.classList,
				animClass = `select__button--fold${this.select.options.length}`;
			btnClasses.remove(animClass);
			void this.selectBtn.offsetWidth;
			btnClasses.add(animClass);
		}
	}
	goToOption(goTo) {
		if (this.isExpanded()) {
			let optionLinks = this.options.querySelectorAll("a"),
				activeEl = document.activeElement,
				linkFound = false;
			for (let l of optionLinks) {
				if (activeEl === l) { linkFound = true; break; }
			}
			if (linkFound) {
				if (goTo === "previous" && activeEl !== optionLinks[0])
					activeEl.previousSibling.focus();
				else if (goTo === "next" && activeEl !== optionLinks[optionLinks.length - 1])
					activeEl.nextSibling.focus();
			}
		}
	}
}

document.addEventListener("DOMContentLoaded", () => {
	new SelectDropdown({ id: "os" });
});

/* ---------- Shared tally + Discord webhook logic ---------- */

const OS_LABELS = {
	windows: "Windows",
	macos: "macOS",
	linux: "Linux",
	chromeos: "Chrome OS",
	ios: "iOS",
	ipados: "iPadOS",
	android: "Android",
	watchos: "watchOS",
	visionos: "visionOS"
};

const TALLY_KEY = "os-survey-votes";
const form = document.getElementById("osForm");
const submitBtn = document.getElementById("submitBtn");
const statusMsg = document.getElementById("statusMsg");
const chartEl = document.getElementById("reveal");

// This page never holds the Discord webhook. It POSTs the vote to a small
// Cloudflare Worker (see worker.js) that keeps the real webhook URL as a
// server-side secret and forwards the message to Discord itself.
// Paste your deployed Worker's URL here after deploying it:
const WORKER_URL = "https://REPLACE-WITH-YOUR-WORKER-URL.workers.dev";

function setStatus(text, kind) {
	statusMsg.textContent = text;
	statusMsg.className = "status" + (kind ? " " + kind : "");
}

async function sendVoteToWorker(tally, votedLabel) {
	const res = await fetch(WORKER_URL, {
		method: "POST",
		headers: { "Content-Type": "application/json" },
		body: JSON.stringify({ tally, votedLabel })
	});
	if (!res.ok) throw new Error(`Worker responded with ${res.status}`);
}

async function getTally() {
	try {
		const result = await window.storage.get(TALLY_KEY, true);
		return result && result.value ? JSON.parse(result.value) : {};
	} catch (e) {
		return {};
	}
}

async function setTally(tally) {
	await window.storage.set(TALLY_KEY, JSON.stringify(tally), true);
}

// ---- Falling snow/leaves ----
(() => {
	const snow = document.getElementById("snow");
	const symbols = ["❄", "❆", "❅"];
	const count = 22;
	for (let i = 0; i < count; i++) {
		const flake = document.createElement("span");
		flake.className = "snowflake";
		flake.textContent = symbols[Math.floor(Math.random() * symbols.length)];
		flake.style.left = Math.random() * 100 + "%";
		flake.style.fontSize = (0.5 + Math.random() * 0.9) + "em";
		flake.style.setProperty("--drift", (Math.random() * 80 - 40) + "px");
		flake.style.animationDuration = (8 + Math.random() * 10) + "s";
		flake.style.animationDelay = (Math.random() * 10) + "s";
		snow.appendChild(flake);
	}
})();

// ---- Live-ish view counter (shared across visitors) ----
(async () => {
	const viewCountEl = document.getElementById("viewCount");
	try {
		const result = await window.storage.get("os-survey-views", true);
		let views = result && result.value ? parseInt(result.value, 10) : 0;
		views += 1;
		await window.storage.set("os-survey-views", String(views), true);
		viewCountEl.textContent = views;
	} catch (e) {
		viewCountEl.textContent = "—";
	}
})();

// ---- Decorative music player (no real audio file attached) ----
(() => {
	const playBtn = document.getElementById("playBtn");
	const fill = document.getElementById("progressFill");
	const timeNow = document.getElementById("timeNow");
	const totalSeconds = 180; // 3:00, matches the displayed end time
	let elapsed = 0;
	let ticking = null;

	function formatTime(s) {
		const m = Math.floor(s / 60);
		const sec = String(Math.floor(s % 60)).padStart(2, "0");
		return `${m}:${sec}`;
	}

	playBtn.addEventListener("click", () => {
		const playing = playBtn.textContent === "⏸";
		if (playing) {
			playBtn.textContent = "▶";
			clearInterval(ticking);
		} else {
			playBtn.textContent = "⏸";
			ticking = setInterval(() => {
				elapsed = Math.min(elapsed + 1, totalSeconds);
				fill.style.width = (elapsed / totalSeconds * 100) + "%";
				if (timeNow) timeNow.textContent = formatTime(elapsed);
				if (elapsed >= totalSeconds) {
					clearInterval(ticking);
					playBtn.textContent = "▶";
				}
			}, 1000);
		}
	});
})();

form.addEventListener("submit", async (e) => {
	e.preventDefault();
	const select = document.getElementById("os");
	const chosen = select.value;

	if (chosen === "none") {
		setStatus("Pick an OS first.", "error");
		return;
	}

	submitBtn.disabled = true;
	setStatus("Saving your vote…");

	try {
		// increment shared tally
		const tally = await getTally();
		tally[chosen] = (tally[chosen] || 0) + 1;
		await setTally(tally);

		// send to discord via the Worker (webhook never touches the browser)
		try {
			await sendVoteToWorker(tally, OS_LABELS[chosen]);
		} catch (err) {
			console.error(err);
		}

		// reveal the guns.gg-style card instead of the plain form
		select.closest(".select").style.display = "none";
		submitBtn.style.display = "none";
		setStatus("");
		chartEl.style.display = "block";
	} catch (err) {
		console.error(err);
		setStatus("Something went wrong saving your vote. Try again.", "error");
		submitBtn.disabled = false;
	}
});

</script>
